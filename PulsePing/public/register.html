<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Create account — PulsePing</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="container">
    <div class="topbar">
      <a href="/" class="brand"><span class="brand-dot"></span> PulsePing</a>
    </div>

    <div class="auth-card">
      <h2 style="margin-bottom: 6px;">Start monitoring</h2>
      <p class="text-sm" style="margin-bottom: 24px;">Free account. No credit card.</p>

      <div class="error-banner" id="errorBanner"></div>

      <form id="registerForm">
        <div class="field">
          <label for="name">Name</label>
          <input type="text" id="name" required autocomplete="name" />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email" />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" required minlength="6" autocomplete="new-password" />
          <div class="field-hint">At least 6 characters.</div>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;" id="submitBtn">Create account</button>
      </form>

      <p class="text-sm text-muted" style="text-align:center; margin-top: 20px;">
        Already have an account? <a href="/login.html" style="color: var(--accent-hover);">Log in</a>
      </p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
