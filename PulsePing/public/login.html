<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Log in — PulsePing</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="container">
    <div class="topbar">
      <a href="/" class="brand"><span class="brand-dot"></span> PulsePing</a>
    </div>

    <div class="auth-card">
      <h2 style="margin-bottom: 6px;">Welcome back</h2>
      <p class="text-sm" style="margin-bottom: 24px;">Log in to see your monitors.</p>

      <div class="error-banner" id="errorBanner"></div>

      <form id="loginForm">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email" />
        </div>
        <div class="field">
          <div class="spread">
            <label for="password" style="margin-bottom:0;">Password</label>
            <a href="/forgot-password.html" class="text-sm" style="color: var(--accent-hover);">Forgot password?</a>
          </div>
          <input type="password" id="password" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;" id="submitBtn">Log in</button>
      </form>

      <p class="text-sm text-muted" style="text-align:center; margin-top: 20px;">
        No account yet? <a href="/register.html" style="color: var(--accent-hover);">Create one</a>
      </p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
