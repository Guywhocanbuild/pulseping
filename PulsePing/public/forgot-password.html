<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Forgot password — PulsePing</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="container">
    <div class="topbar">
      <a href="/" class="brand"><span class="brand-dot"></span> PulsePing</a>
    </div>

    <div class="auth-card">
      <h2 style="margin-bottom: 6px;">Reset your password</h2>
      <p class="text-sm" style="margin-bottom: 24px;">Enter your account email and we'll send you a reset link.</p>

      <div class="error-banner" id="errorBanner"></div>
      <div class="error-banner" id="successBanner" style="background: var(--pulse-up-dim); border-color: var(--pulse-up); color: #a7f3d4;"></div>

      <form id="forgotForm">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email" />
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;" id="submitBtn">Send reset link</button>
      </form>

      <p class="text-sm text-muted" style="text-align:center; margin-top: 20px;">
        <a href="/login.html" style="color: var(--accent-hover);">&larr; Back to log in</a>
      </p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('errorBanner');
      const successEl = document.getElementById('successBanner');
      errorEl.classList.remove('show');
      successEl.classList.remove('show');

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Sending...';

      try {
        const email = document.getElementById('email').value.trim();
        const data = await api('/auth/forgot-password', { method: 'POST', body: { email }, auth: false });
        successEl.textContent = data.message;
        successEl.classList.add('show');
        document.getElementById('forgotForm').reset();
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.add('show');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send reset link';
      }
    });
  </script>
</body>
</html>
