<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Set new password — PulsePing</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="container">
    <div class="topbar">
      <a href="/" class="brand"><span class="brand-dot"></span> PulsePing</a>
    </div>

    <div class="auth-card">
      <h2 style="margin-bottom: 6px;">Set a new password</h2>
      <p class="text-sm" style="margin-bottom: 24px;">Choose a new password for your account.</p>

      <div class="error-banner" id="errorBanner"></div>
      <div class="error-banner" id="successBanner" style="background: var(--pulse-up-dim); border-color: var(--pulse-up); color: #a7f3d4;"></div>

      <form id="resetForm">
        <div class="field">
          <label for="newPassword">New password</label>
          <input type="password" id="newPassword" required minlength="6" autocomplete="new-password" />
          <div class="field-hint">At least 6 characters.</div>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;" id="submitBtn">Reset password</button>
      </form>

      <p class="text-sm text-muted" style="text-align:center; margin-top: 20px;" id="loginLinkRow">
        <a href="/login.html" style="color: var(--accent-hover);">&larr; Back to log in</a>
      </p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const email = params.get('email');

    if (!token || !email) {
      document.getElementById('errorBanner').textContent = 'This reset link is missing information. Please request a new one from the forgot password page.';
      document.getElementById('errorBanner').classList.add('show');
      document.getElementById('resetForm').style.display = 'none';
    }

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('errorBanner');
      const successEl = document.getElementById('successBanner');
      errorEl.classList.remove('show');
      successEl.classList.remove('show');

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Resetting...';

      try {
        const newPassword = document.getElementById('newPassword').value;
        const data = await api('/auth/reset-password', {
          method: 'POST',
          body: { email, token, newPassword },
          auth: false,
        });
        successEl.textContent = data.message;
        successEl.classList.add('show');
        document.getElementById('resetForm').style.display = 'none';
        setTimeout(() => (window.location.href = '/login.html'), 2000);
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Reset password';
      }
    });
  </script>
</body>
</html>
